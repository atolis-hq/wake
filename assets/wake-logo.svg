<svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(55 55)">
    <!-- Subtle outer boundary -->
    <circle r="54" fill="none" stroke="#0F766E" opacity=".10"></circle>

    <!-- Main circular sweep -->
    <path d="M-42.5-11.5
         A44 44 0 1 0 42.5-11.5" fill="none" stroke="#2DD4BF" stroke-width="7.5" stroke-linecap="round"></path>

    <!-- Upper-left secondary arc, separated from main sweep -->
    <path d="M-36-25.2
         A44 44 0 0 1-25.2-36" fill="none" stroke="#5EEAD4" stroke-width="7.5" stroke-linecap="round"></path>

    <!-- Upper-right secondary arc, separated from main sweep -->
    <path d="M25.2-36
         A44 44 0 0 1 36-25.2" fill="none" stroke="#5EEAD4" stroke-width="7.5" stroke-linecap="round"></path>

    <!-- Subtle signal rings -->
    <circle r="25" fill="#2DD4BF" opacity=".08"></circle>

    <circle r="11" fill="#2DD4BF" opacity=".25"></circle>

    <!-- Tall central wake -->
    <path d="M-18 23
         C-9 22 -8 2 0-2
         C8 2 9 22 18 23" fill="none" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>
</svg>