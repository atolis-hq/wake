name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run tests when the Node scaffold exists
        shell: bash
        run: |
          if [ -f package.json ]; then
            if [ ! -f package-lock.json ]; then
              echo "package.json exists but package-lock.json is missing." >&2
              exit 1
            fi

            npm ci
            npm test
            exit 0
          fi

          echo "Wake does not have a runnable Node package yet. CI is ready for pull requests and will start running npm test once the scaffold lands."

